; ArmBot — Main Firmware
; Flash this to the ESP32-S3 to run the robot arm.
;
; ── Upload modes ──────────────────────────────────────────────────────────────
; USB  (first time only): comment out the three espota lines below
; WiFi (after first flash): uncomment all three espota lines

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = espota        ← uncomment these after first USB flash
upload_port     = 192.168.4.1
upload_flags    = --auth=armbot-ota
upload_speed = 921600
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ── OTA (WiFi upload) — uncomment all three lines after first USB flash ───────
upload_protocol = espota
upload_port     = 192.168.4.1
upload_flags    = --auth=armbot-ota

lib_deps =
    madhephaestus/ESP32Servo
    waspinator/AccelStepper
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
