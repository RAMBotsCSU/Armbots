<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RamBOTs Control — Preview</title>
  <style>
    *    { box-sizing: border-box; }
    body { font-family: Helvetica; background: #1a1a2e; color: #eee; text-align: center; margin: 0; padding: 16px; }

    /* ── Header ── */
    .header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .header h1 { color: #e0e0e0; margin: 0; font-size: 24px; }
    .header .sub { color: #555; font-size: 12px; margin-top: 3px; }

    /* ── Tabs ── */
    .tabs { display: inline-flex; background: #0f0f1e; border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
    .tab  { padding: 10px 32px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: #555; letter-spacing: 0.5px; transition: all 0.2s; }
    .tab.active { background: #2196F3; color: #fff; }

    /* ── Tab content ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Manual tab — vertical sliders ── */
    .sliders-row  { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .joint        { display: flex; flex-direction: column; align-items: center; background: #16213e; border-radius: 12px; padding: 16px 12px; width: 80px; }
    .joint label  { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .angle        { font-size: 20px; font-weight: bold; color: #2196F3; margin-bottom: 10px; }
    .slider-inner { display: flex; align-items: center; }
    .slider-wrap  { display: flex; flex-direction: column; align-items: center; height: 180px; justify-content: center; }
    input[type=range][orient=vertical], input[type=range].vertical {
      -webkit-appearance: slider-vertical; writing-mode: vertical-lr; direction: rtl;
      width: 36px; height: 160px; cursor: pointer; accent-color: #2196F3;
    }
    .tick-col { display: flex; flex-direction: column; justify-content: space-between; height: 160px; color: #555; font-size: 10px; margin-left: 4px; }

    /* ── Manual tab — horizontal sliders ── */
    .stepper-row   { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .stepper-joint { display: flex; flex-direction: column; align-items: center; background: #16213e; border-radius: 12px; padding: 16px 12px; width: 140px; }
    .stepper-joint label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    input[type=range].horiz { width: 100%; accent-color: #2196F3; cursor: pointer; }
    .tick-row { display: flex; justify-content: space-between; color: #555; font-size: 10px; margin-top: 4px; width: 100%; }

    /* ── IK tab — two-column layout ── */
    .ik-layout { display: flex; justify-content: center; align-items: flex-start; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
    .ik-left   { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .ik-right  { display: flex; gap: 14px; align-items: flex-start; padding-top: 8px; }

    /* ── IK tab — position display ── */
    .ik-pos      { display: flex; justify-content: center; gap: 12px; }
    .ik-pos-item { background: #16213e; border-radius: 10px; padding: 8px 14px; min-width: 90px; }
    .ik-pos-item label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 3px; }
    .ik-pos-item span  { font-size: 18px; font-weight: bold; color: #2196F3; }
    .ik-pos-item small { font-size: 10px; color: #555; }

    /* ── IK tab — joystick ── */
    .joy-wrap  { display: flex; flex-direction: column; align-items: center; }
    .joy-title { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    #jpad      { width: 160px; height: 160px; background: #16213e; border-radius: 50%; position: relative;
                 border: 2px solid #1e3a5f; touch-action: none; user-select: none; cursor: pointer; }
    #jpad::before, #jpad::after { content:''; position:absolute; background:#1e3a5f; }
    #jpad::before { width:1px; height:100%; left:50%; top:0; }
    #jpad::after  { width:100%; height:1px; left:0; top:50%; }
    #jknob     { width: 52px; height: 52px; background: #2196F3; border-radius: 50%; position: absolute;
                 top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
                 box-shadow: 0 0 12px rgba(33,150,243,0.5); }
    .joy-axes  { display: flex; justify-content: space-between; width: 160px; margin-top: 8px; }
    .joy-axes span { font-size: 10px; color: #444; }

    /* ── IK tab — vertical slider cards ── */
    .ik-vjoint { display: flex; flex-direction: column; align-items: center; background: #16213e; border-radius: 12px; padding: 16px 12px; width: 80px; }
    .ik-vjoint label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    /* ── Shared ── */
    .button   { background: #2196F3; border: none; color: white; padding: 12px 28px; font-size: 18px; margin: 6px; cursor: pointer; border-radius: 8px; }
    .home-btn { background: #FF5722; }
    .status   { font-size: 13px; color: #555; margin-top: 20px; }
    .status.connected { color: #4CAF50; }
  </style>
</head>

    <div>
      <h1>RamBOTs</h1>
      <div class="sub">Robotic Arm Control</div>
    </div>
  </div>

  <!-- ── Tabs ── -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('manual',this)">Manual</button>
    <button class="tab"        onclick="showTab('ik',this)">IK Control</button>
  </div>

  <!-- TAB 1 — Manual -->
  <div id="tab-manual" class="tab-content active">

    <div class="sliders-row">

      <div class="joint">
        <label>Elbow</label>
        <div class="angle" id="elbowVal">15&deg;</div>
        <div class="slider-inner">
          <div class="slider-wrap">
            <input id="slider-elbow" type="range" class="vertical" orient="vertical"
                   min="15" max="180" value="15" step="1"
                   oninput="document.getElementById('elbowVal').innerHTML=this.value+'&deg;'">
          </div>
          <div class="tick-col"><span>180&deg;</span><span>90&deg;</span><span>15&deg;</span></div>
        </div>
      </div>

      <div class="joint">
        <label>Shoulder</label>
        <div class="angle" id="shoulderVal">0&deg;</div>
        <div class="slider-inner">
          <div class="slider-wrap">
            <input id="slider-shoulder" type="range" class="vertical" orient="vertical"
                   min="0" max="180" value="0" step="1"
                   oninput="document.getElementById('shoulderVal').innerHTML=this.value+'&deg;'">
          </div>
          <div class="tick-col"><span>180&deg;</span><span>90&deg;</span><span>0&deg;</span></div>
        </div>
      </div>

      <div class="joint">
        <label>Wrist</label>
        <div class="angle" id="wristVal">22&deg;</div>
        <div class="slider-inner">
          <div class="slider-wrap">
            <input id="slider-wrist" type="range" class="vertical" orient="vertical"
                   min="22" max="180" value="22" step="1"
                   oninput="document.getElementById('wristVal').innerHTML=this.value+'&deg;'">
          </div>
          <div class="tick-col"><span>180&deg;</span><span>90&deg;</span><span>0&deg;</span></div>
        </div>
      </div>

    </div>

    <div class="stepper-row">

      <div class="stepper-joint">
        <label>Base</label>
        <div class="angle" id="baseVal">0&deg;</div>
        <input id="slider-base" type="range" class="horiz" min="-180" max="180" value="0" step="1"
               oninput="document.getElementById('baseVal').innerHTML=this.value+'&deg;'">
        <div class="tick-row"><span>-180&deg;</span><span>0&deg;</span><span>180&deg;</span></div>
      </div>

      <div class="stepper-joint">
        <label>Gripper</label>
        <div class="angle" id="gripperVal">0&deg;</div>
        <input id="slider-gripper" type="range" class="horiz" min="0" max="180" value="0" step="1"
               oninput="document.getElementById('gripperVal').innerHTML=this.value+'&deg;'">
        <div class="tick-row"><span>0&deg;</span><span>90&deg;</span><span>180&deg;</span></div>
      </div>

    </div>

    <p><button class="button home-btn" onclick="previewHome()">Home All</button></p>

  </div>

  <!-- TAB 2 — IK Control -->
  <div id="tab-ik" class="tab-content">

    <div class="ik-layout">

      <!-- Left: position display + joystick -->
      <div class="ik-left">
        <div class="ik-pos">
          <div class="ik-pos-item"><label>Reach</label><span id="ik-reach">600</span><small> mm</small></div>
          <div class="ik-pos-item"><label>Height</label><span id="ik-height">200</span><small> mm</small></div>
        </div>
        <div class="joy-wrap">
          <div class="joy-title">End Effector</div>
          <div id="jpad"><div id="jknob"></div></div>
          <div class="joy-axes">
            <span>&larr; Retract</span>
            <span>&uarr;&darr;</span>
            <span>Extend &rarr;</span>
          </div>
        </div>
      </div>

      <!-- Right: vertical sliders -->
      <div class="ik-right">

        <div class="ik-vjoint">
          <label>Base</label>
          <div class="angle" id="ik-base-val">0&deg;</div>
          <div class="slider-inner">
            <div class="slider-wrap">
              <input id="ik-slider-base" type="range" class="vertical" orient="vertical"
                     min="-180" max="180" value="0" step="1"
                     oninput="document.getElementById('ik-base-val').innerHTML=this.value+'&deg;'">
            </div>
            <div class="tick-col"><span>180&deg;</span><span>0&deg;</span><span>-180&deg;</span></div>
          </div>
        </div>

        <div class="ik-vjoint">
          <label>Wrist &phi;</label>
          <div class="angle" id="ik-phi-val">0&deg;</div>
          <div class="slider-inner">
            <div class="slider-wrap">
              <input id="ik-slider-phi" type="range" class="vertical" orient="vertical"
                     min="-90" max="90" value="0" step="1"
                     oninput="document.getElementById('ik-phi-val').innerHTML=this.value+'&deg;'">
            </div>
            <div class="tick-col"><span>90&deg;</span><span>0&deg;</span><span>-90&deg;</span></div>
          </div>
        </div>

      </div>
    </div>

    <p><button class="button home-btn" onclick="previewHome()">Home All</button></p>

  </div>

  <!-- ── Status bar ── -->
  <div class="status" id="status">Preview mode &mdash; not connected to ESP32</div>

  <script>
    function showTab(id, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      el.classList.add('active');
    }

    function previewHome() {
      document.getElementById('elbowVal').innerHTML    = '15&deg;';
      document.getElementById('shoulderVal').innerHTML = '0&deg;';
      document.getElementById('wristVal').innerHTML    = '22&deg;';
      document.getElementById('baseVal').innerHTML     = '0&deg;';
      document.getElementById('gripperVal').innerHTML  = '0&deg;';
      document.getElementById('slider-elbow').value    = 15;
      document.getElementById('slider-shoulder').value = 0;
      document.getElementById('slider-wrist').value    = 22;
      document.getElementById('slider-base').value     = 0;
      document.getElementById('slider-gripper').value  = 0;
      document.getElementById('ik-reach').textContent  = '600';
      document.getElementById('ik-height').textContent = '200';
      document.getElementById('ik-base-val').innerHTML = '0&deg;';
      document.getElementById('ik-phi-val').innerHTML  = '0&deg;';
      document.getElementById('ik-slider-base').value  = 0;
      document.getElementById('ik-slider-phi').value   = 0;
    }

    // Virtual Joystick (preview: updates reach/height locally)
    const pad  = document.getElementById('jpad');
    const knob = document.getElementById('jknob');
    let jActive = false, jx = 0, jz = 0, jTimer = null;
    const STEP = 15;

    function jUpdate(e) {
      const r  = pad.getBoundingClientRect();
      const cx = r.left + r.width  / 2;
      const cy = r.top  + r.height / 2;
      const t  = e.touches ? e.touches[0] : e;
      let dx   = t.clientX - cx;
      let dy   = t.clientY - cy;
      const maxR = r.width / 2 - 14;
      const dist = Math.min(Math.hypot(dx, dy), maxR);
      const ang  = Math.atan2(dy, dx);
      dx = Math.cos(ang) * dist;
      dy = Math.sin(ang) * dist;
      jx =  dx / maxR;
      jz = -dy / maxR;
      knob.style.transform = 'translate(calc(-50% + ' + dx.toFixed(1) + 'px), calc(-50% + ' + dy.toFixed(1) + 'px))';
    }

    function jSend() {
      if (Math.abs(jx) < 0.05 && Math.abs(jz) < 0.05) return;
      const r2 = parseInt(document.getElementById('ik-reach').textContent)  + jx * STEP;
      const z2 = parseInt(document.getElementById('ik-height').textContent) + jz * STEP;
      document.getElementById('ik-reach').textContent  = Math.round(Math.max(150, Math.min(900,  r2)));
      document.getElementById('ik-height').textContent = Math.round(Math.max(-300, Math.min(600, z2)));
    }

    function jStart(e) { e.preventDefault(); jActive = true; jUpdate(e); jTimer = setInterval(jSend, 80); }
    function jMove(e)  { if (!jActive) return; e.preventDefault(); jUpdate(e); }
    function jEnd()    { jActive = false; clearInterval(jTimer); jx = jz = 0; knob.style.transform = 'translate(-50%,-50%)'; }

    pad.addEventListener('mousedown',  jStart);
    pad.addEventListener('mousemove',  jMove);
    pad.addEventListener('mouseup',    jEnd);
    pad.addEventListener('mouseleave', jEnd);
    pad.addEventListener('touchstart', jStart, { passive: false });
    pad.addEventListener('touchmove',  jMove,  { passive: false });
    pad.addEventListener('touchend',   jEnd);
  </script>
</body>
</html>
